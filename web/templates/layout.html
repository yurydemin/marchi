{{define "layout"}}
<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Marchi</title>
  <link rel="stylesheet" href="/static/css/app.css">
  <script src="/static/js/htmx.min.js" defer></script>
  <script src="/static/js/app.js" defer></script>
</head>
<body class="h-full bg-stone-50 dark:bg-stone-900 text-stone-900 dark:text-stone-100">
  <header class="border-b border-stone-200 dark:border-stone-700 bg-white dark:bg-stone-800">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3">
      <span class="text-lg font-semibold">Marchi</span>
      <div class="flex items-center gap-4 text-sm">
        {{if .Unlocked}}
        <nav class="flex items-center gap-4">
          <a class="text-stone-600 dark:text-stone-300 hover:text-stone-900 dark:hover:text-stone-100" href="/">{{T "nav.dashboard"}}</a>
          <a class="text-stone-600 dark:text-stone-300 hover:text-stone-900 dark:hover:text-stone-100" href="/accounts">{{T "nav.accounts"}}</a>
          <a class="text-stone-600 dark:text-stone-300 hover:text-stone-900 dark:hover:text-stone-100" href="/archive">{{T "nav.archive"}}</a>
          <a class="text-stone-600 dark:text-stone-300 hover:text-stone-900 dark:hover:text-stone-100" href="/rules">{{T "nav.rules"}}</a>
          <a class="text-stone-600 dark:text-stone-300 hover:text-stone-900 dark:hover:text-stone-100" href="/settings">{{T "nav.settings"}}</a>
        </nav>
        {{end}}
        <div class="flex items-center gap-1 text-xs font-medium text-stone-600 dark:text-stone-300">
          {{range $code := langs}}
          <a class="rounded px-1.5 py-1 uppercase hover:bg-stone-50 dark:hover:bg-stone-700" href="/lang/{{$code}}">{{$code}}</a>
          {{end}}
        </div>
        <button type="button" id="theme-toggle"
          class="rounded border border-stone-300 dark:border-stone-600 px-2 py-1 text-xs font-medium text-stone-600 dark:text-stone-300 hover:bg-stone-50 dark:hover:bg-stone-700"
          aria-label="{{T "nav.toggle_dark_mode"}}" data-label-dark="{{T "nav.theme_dark"}}" data-label-light="{{T "nav.theme_light"}}">{{T "nav.theme_dark"}}</button>
      </div>
    </div>
  </header>
  <main class="mx-auto max-w-7xl px-4 py-10">
    {{template "content" .}}
  </main>
</body>
</html>
{{end}}
