{{define "content"}}
{{if .Unlocked}}
<div class="mx-auto max-w-md rounded-lg border border-slate-200 bg-white p-6 shadow-sm">
  <h1 class="mb-1 text-xl font-semibold">Vault unlocked</h1>
  <p class="text-sm text-slate-500">The dashboard is coming in a later step. For now, the REST API and WebSocket progress endpoints are live.</p>
</div>
{{else}}
<div class="mx-auto max-w-sm rounded-lg border border-slate-200 bg-white p-6 shadow-sm">
  <h1 class="mb-1 text-xl font-semibold">Unlock MailVault</h1>
  <p class="mb-4 text-sm text-slate-500">Enter your Master Key password to continue.</p>
  <form id="unlock-form" hx-post="/unlock" hx-swap="none">
    <label class="mb-1 block text-sm font-medium" for="password">Password</label>
    <input
      class="mb-3 w-full rounded border border-slate-300 px-3 py-2 text-sm focus:border-slate-500 focus:outline-none"
      type="password" id="password" name="password" autocomplete="current-password" required minlength="12">
    <button
      class="w-full rounded bg-slate-900 px-3 py-2 text-sm font-medium text-white hover:bg-slate-700"
      type="submit">Unlock</button>
  </form>
  <div id="unlock-error" class="mt-3 text-sm text-red-600" role="alert"></div>
</div>
{{end}}
{{end}}
