name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: gofmt / vet / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: gofmt
        run: |
          fmt_out="$(gofmt -l .)"
          if [ -n "$fmt_out" ]; then
            echo "gofmt found unformatted files:"
            echo "$fmt_out"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      # ubuntu-latest ships Docker preinstalled, so the dovecot/minio
      # test harnesses (internal/testutil/dovecot, internal/testutil/minio)
      # run for real here instead of skipping via their RequireDocker guard.
      - name: go test
        run: go test ./... -count=1 -timeout 15m

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - uses: golang/govulncheck-action@v1
        with:
          go-version-input: "1.25"
          check-latest: true
