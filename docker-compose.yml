services:
  # A fresh named volume is created root-owned; the marchi image runs as
  # a nonroot distroless user (uid 65532) with no shell of its own to fix
  # that from inside the main container. This one-shot service does it
  # once, with a plain image that has a shell, then exits — marchi only
  # starts after it succeeds.
  marchi-data-init:
    image: busybox
    command: ["chown", "-R", "65532:65532", "/data"]
    volumes:
      - marchi-data:/data

  marchi:
    build: .
    depends_on:
      marchi-data-init:
        condition: service_completed_successfully
    ports:
      - "8443:8080"
    volumes:
      - marchi-data:/data
    environment:
      - MARCHI_MASTER_KEY=${MARCHI_MASTER_KEY:-}
    restart: unless-stopped

  # Local S3-compatible storage for exercising Marchi's S3 mirroring
  # (Settings UI -> S3 Storage) without a real cloud account. Not started
  # by a plain `docker compose up` — opt in with:
  #   docker compose --profile s3 up
  minio:
    image: minio/minio
    profiles: ["s3"]
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=marchiadmin
      - MINIO_ROOT_PASSWORD=marchisecret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    restart: unless-stopped

volumes:
  marchi-data:
  minio-data:
