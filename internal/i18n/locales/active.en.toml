# English message catalog (source language). Message IDs are namespaced
# by page (nav.*, dashboard.*, unlock.*, accounts.*, archive.*, rules.*,
# settings.*) with a common.* namespace for chrome/words reused verbatim
# across pages (Save/Cancel/Edit/Delete/Status/active/paused/...).
#
# Simple messages are flat "id = value" pairs. Messages needing a plural
# form use a [id] table with "one"/"other" keys (go-i18n's CLDR plural
# selection via the "Count" template-data key — see internal/i18n.T).

